services:
  open-webui:
    # 上流 OWUI に PDF→画像変換用パッケージを焼き込んだ自前イメージ。
    # Dockerfile は docker/open-webui/Dockerfile。バージョン上げ時は
    # Dockerfile の FROM タグと下の image タグを揃えて
    #   docker compose build --pull open-webui
    # でリビルド。
    image: llens/open-webui:v0.9.5
    build:
      # build context は repo root。Dockerfile から prompts/code-interpreter.md を
      # COPY する必要があるため。.dockerignore で重量級ディレクトリは除外済。
      context: .
      dockerfile: docker/open-webui/Dockerfile
    container_name: llens-open-webui
    environment:
      - TZ=Asia/Tokyo
      - WEBUI_NAME=LLENS
      - OPENAI_API_BASE_URL=http://host.docker.internal:8000/v1
      - OPENAI_API_KEY=EMPTY
      - ENABLE_API_KEYS=true
      - ENABLE_OLLAMA_API=false
      - ENABLE_VERSION_UPDATE_CHECK=false
      - ENABLE_PERSISTENT_CONFIG=false
      - ENABLE_FOLLOW_UP_GENERATION=false
      - ENABLE_AUTOCOMPLETE_GENERATION=false
      - CONTENT_EXTRACTION_ENGINE=docling

      ##*  Docling関連
      - DOCLING_SERVER_URL=http://docling:5001
      - 'DOCLING_PARAMS={"do_ocr": false}'
      - BYPASS_EMBEDDING_AND_RETRIEVAL=true
      # アップロード許可拡張子 (env 名は RAG_ だが判定はアップロード入口 files.py、RAG 有無と無関係)。
      # docling でOCRはしないので (png/jpg 等) は除外, SVGもエラーになるので除外
      - RAG_ALLOWED_FILE_EXTENSIONS=pdf,docx,pptx,xlsx,csv,html,htm,md,markdown,txt,asciidoc,adoc,json,xml,vtt,tex
      - 'DEFAULT_PROMPT_SUGGESTIONS=[{"title":["はじめての方へ","LLENSの使い方"],"content":"はじめて使います。何ができるか教えてください。"}]'


      ##* ユーザー登録関連
      - ENABLE_SIGNUP=false
      # 承認待ちオーバーレイ: 管理者の個人情報は出さず、運営チーム窓口を案内
      - SHOW_ADMIN_DETAILS=false
      - PENDING_USER_OVERLAY_TITLE=管理者のアクセス承認待ち
      - "PENDING_USER_OVERLAY_CONTENT=現在あなたは管理者のアクセス承認待ちです。\nLLENSの利用には事前に「PRISM-HU LLENS運営チーム」への連絡が必要です。\n承認は手作業のため、登録から2-3営業日程度頂きます。\n迅速なアクセス承認をご希望の場合は下記までご連絡下さい。\n\nPRISM-HU LLENS運営チーム\nprism-hu-office@pop.med.hokudai.ac.jp / 内線: 5352"

      ##*  STT関連
      # 音声認識 (STT): OWUI 内蔵 faster-whisper (CPU)。WHISPER_* の詳細・モデル選定・DL は docs/stt.md と README
      - STT_ENGINE=
      - WHISPER_MODEL=/models/whisper/faster-whisper-large-v3-turbo-ct2
      - WHISPER_COMPUTE_TYPE=int8
      - WHISPER_LANGUAGE=ja
      - WHISPER_VAD_FILTER=true
      - WHISPER_MODEL_AUTO_UPDATE=false

      ##*  未使用 UI 機能は閉域運用に合わせて全 OFF
      - ENABLE_COMMUNITY_SHARING=false
      - ENABLE_MESSAGE_RATING=false
      - ENABLE_FOLDERS=false
      - ENABLE_MEMORIES=false
      - ENABLE_NOTES=false
      - ENABLE_CHANNELS=false
      - ENABLE_CALENDAR=false
      - ENABLE_AUTOMATIONS=false
      - ENABLE_USER_WEBHOOKS=false
      - ENABLE_PIP_INSTALL_FRONTMATTER_REQUIREMENTS=false
      - ENABLE_EVALUATION_ARENA_MODELS=false
    volumes:
      - open-webui-data:/app/backend/data
      # STT モデル (ホスト ./models/whisper を read-only マウント)。SGLang 用 models/ とは別系統。
      - ./models/whisper:/models/whisper:ro
    ports:
      # Caddy (:80) もしくは開発時はCloudflare Tunnelでアクセス
      - "127.0.0.1:8080:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - docling
      - redis
    restart: unless-stopped

  redis:
    # subagent tool (owui/tools/subagent.py) の会話スレッド置き場。会話履歴を
    # thread_id で保持し、追い質問のたびに復元→積み直し→再推論する。中身も履歴も
    # ここに隔離され主コンテキストには出ない。scratch なので揮発で良い:
    # 永続化 OFF + TTL スライディングで放置 thread は自動 GC、再起動で消えて困らない。
    # OWUI コンテナからのみ触るので host へはポート公開しない。
    image: redis:7-alpine
    container_name: llens-redis
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    restart: unless-stopped

  docling:
    # CPU 版。GPU 版は SGLang が H200x8 を専有しているため使えない。
    image: quay.io/docling-project/docling-serve:v1.17.0
    container_name: llens-docling
    environment:
      - TZ=Asia/Tokyo
    ports:
      # OWUI からは docker network 内で docling:5001 で届く。host 側は debug 用 localhost のみ
      - "127.0.0.1:5001:5001"
    restart: unless-stopped

  dcgm-exporter:
    image: nvcr.io/nvidia/k8s/dcgm-exporter:4.5.2-4.8.1-distroless
    container_name: llens-dcgm-exporter
    restart: unless-stopped
    cap_add:
      - SYS_ADMIN
    ports:
      # Prometheus からは docker network 内で dcgm-exporter:9400 で届く。host 側は debug 用のみ
      - "127.0.0.1:9400:9400"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  prometheus:
    image: prom/prometheus:v3.11.2
    container_name: llens-prometheus
    restart: unless-stopped
    ports:
      # Grafana からは docker network 内で prometheus:9090 で届く。host 側は debug 用のみ
      - "127.0.0.1:9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    extra_hosts:
      - "host.docker.internal:host-gateway"

  grafana:
    # 13.0 系の patch は自動追従。minor 更新 (13.1 以降) は手動でタグを上げる。
    image: grafana/grafana:13.0
    container_name: llens-grafana
    restart: unless-stopped
    ports:
      # HINES 全体から touch 可。volume が空の時 .env の GRAFANA_ADMIN_PASSWORD が seed される
      - "9000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
    environment:
      # サーバーログを JST に。ダッシュボードの表示 TZ は別設定 (既定 browser =
      # 閲覧者のブラウザ TZ なので JST 利用者には既に JST 表示)。
      - TZ=Asia/Tokyo
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:?Set GRAFANA_ADMIN_PASSWORD in .env (see .env.example)}
      - GF_ANALYTICS_REPORTING_ENABLED=false
      - GF_ANALYTICS_CHECK_FOR_UPDATES=false
      - GF_ANALYTICS_CHECK_FOR_PLUGIN_UPDATES=false
      - GF_NEWS_NEWS_FEED_ENABLED=false

volumes:
  open-webui-data:
  prometheus_data:
  grafana_data:
