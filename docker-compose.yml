services:
  open-webui:
    image: ghcr.io/open-webui/open-webui:v0.9.1
    container_name: llens-open-webui
    environment:
      - OPENAI_API_BASE_URL=http://host.docker.internal:8000/v1
      - OPENAI_API_KEY=EMPTY
      - WEBUI_SHOW_UPDATE_NOTIFICATION=false
      - ENABLE_PERSISTENT_CONFIG=false
      - 'DEFAULT_PROMPT_SUGGESTIONS=[{"title":["はじめての方へ","LLENSの使い方"],"content":"はじめて使います。何ができるか教えてください。"}]'
      - ENABLE_FOLLOW_UP_GENERATION=false
      - ENABLE_AUTOCOMPLETE_GENERATION=false
      - CONTENT_EXTRACTION_ENGINE=docling
      - DOCLING_SERVER_URL=http://docling:5001
    volumes:
      - open-webui-data:/app/backend/data
    ports:
      - "8080:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - docling
    restart: unless-stopped

  docling:
    # CPU 版。GPU 版は SGLang が H200x8 を専有しているため使えない。
    image: quay.io/docling-project/docling-serve:v1.17.0
    container_name: llens-docling
    ports:
      - "5001:5001"
    restart: unless-stopped

  dcgm-exporter:
    image: nvcr.io/nvidia/k8s/dcgm-exporter:4.5.2-4.8.1-distroless
    container_name: llens-dcgm-exporter
    restart: unless-stopped
    cap_add:
      - SYS_ADMIN
    ports:
      - "9400:9400"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  prometheus:
    image: prom/prometheus:v3.11.2
    container_name: llens-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    extra_hosts:
      - "host.docker.internal:host-gateway"

  grafana:
    # 13.0 系の patch は自動追従。minor 更新 (13.1 以降) は手動でタグを上げる。
    image: grafana/grafana:13.0
    container_name: llens-grafana
    restart: unless-stopped
    ports:
      - "9000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_ANALYTICS_REPORTING_ENABLED=false
      - GF_ANALYTICS_CHECK_FOR_UPDATES=false
      - GF_ANALYTICS_CHECK_FOR_PLUGIN_UPDATES=false
      - GF_NEWS_NEWS_FEED_ENABLED=false

volumes:
  open-webui-data:
  prometheus_data:
  grafana_data:
