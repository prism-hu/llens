services:
  open-webui:
    # 上流 OWUI に PDF→画像変換用パッケージを焼き込んだ自前イメージ。
    # Dockerfile は docker/open-webui/Dockerfile。バージョン上げ時は
    # Dockerfile の FROM タグと下の image タグを揃えて
    #   docker compose build --pull open-webui
    # でリビルド。
    image: llens/open-webui:v0.9.5
    build:
      # build context は repo root。Dockerfile から prompts/code-interpreter.md を
      # COPY する必要があるため。.dockerignore で重量級ディレクトリは除外済。
      context: .
      dockerfile: docker/open-webui/Dockerfile
    container_name: llens-open-webui
    environment:
      - WEBUI_NAME=LLENS
      - OPENAI_API_BASE_URL=http://host.docker.internal:8000/v1
      - OPENAI_API_KEY=EMPTY
      - ENABLE_OLLAMA_API=false
      - ENABLE_VERSION_UPDATE_CHECK=false
      - ENABLE_PERSISTENT_CONFIG=false
      - ENABLE_FOLLOW_UP_GENERATION=false
      - ENABLE_AUTOCOMPLETE_GENERATION=false
      - CONTENT_EXTRACTION_ENGINE=docling
      - DOCLING_SERVER_URL=http://docling:5001
      - 'DOCLING_PARAMS={"do_ocr": false}'
      - BYPASS_EMBEDDING_AND_RETRIEVAL=true
      - ENABLE_PIP_INSTALL_FRONTMATTER_REQUIREMENTS=false
      - 'DEFAULT_PROMPT_SUGGESTIONS=[{"title":["はじめての方へ","LLENSの使い方"],"content":"はじめて使います。何ができるか教えてください。"}]'
    volumes:
      - open-webui-data:/app/backend/data
    ports:
      # Caddy (:80) もしくは開発時はCloudflare Tunnelでアクセス
      - "127.0.0.1:8080:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - docling
    restart: unless-stopped

  docling:
    # CPU 版。GPU 版は SGLang が H200x8 を専有しているため使えない。
    image: quay.io/docling-project/docling-serve:v1.17.0
    container_name: llens-docling
    ports:
      # OWUI からは docker network 内で docling:5001 で届く。host 側は debug 用 localhost のみ
      - "127.0.0.1:5001:5001"
    restart: unless-stopped

  dcgm-exporter:
    image: nvcr.io/nvidia/k8s/dcgm-exporter:4.5.2-4.8.1-distroless
    container_name: llens-dcgm-exporter
    restart: unless-stopped
    cap_add:
      - SYS_ADMIN
    ports:
      # Prometheus からは docker network 内で dcgm-exporter:9400 で届く。host 側は debug 用のみ
      - "127.0.0.1:9400:9400"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  prometheus:
    image: prom/prometheus:v3.11.2
    container_name: llens-prometheus
    restart: unless-stopped
    ports:
      # Grafana からは docker network 内で prometheus:9090 で届く。host 側は debug 用のみ
      - "127.0.0.1:9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    extra_hosts:
      - "host.docker.internal:host-gateway"

  grafana:
    # 13.0 系の patch は自動追従。minor 更新 (13.1 以降) は手動でタグを上げる。
    image: grafana/grafana:13.0
    container_name: llens-grafana
    restart: unless-stopped
    ports:
      # HINES 全体から touch 可。volume が空の時 .env の GRAFANA_ADMIN_PASSWORD が seed される
      - "9000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:?Set GRAFANA_ADMIN_PASSWORD in .env (see .env.example)}
      - GF_ANALYTICS_REPORTING_ENABLED=false
      - GF_ANALYTICS_CHECK_FOR_UPDATES=false
      - GF_ANALYTICS_CHECK_FOR_PLUGIN_UPDATES=false
      - GF_NEWS_NEWS_FEED_ENABLED=false

volumes:
  open-webui-data:
  prometheus_data:
  grafana_data:
